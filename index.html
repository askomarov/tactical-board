<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
        <title>Tactical Board</title>
    </head>
    <body>
        <script>
            if (window.Telegram?.WebApp?.platform && window.Telegram.WebApp.platform !== "unknown") {
                document.documentElement.classList.add("telegram-app");
                document.body.classList.add("telegram-app");
            }
        </script>
        <div id="app">
            <div class="board-root">
                <div class="board-field">
                    <div class="board-canvas-wrap">
                        <canvas
                            id="tactical-canvas"
                            class="board-canvas"
                            width="300"
                            height="300"
                        ></canvas>
                    </div>
                </div>
                <div class="toolbar-bar">
                    <div class="toolbar-spawn" aria-label="Добавить на поле">
                        <button
                            type="button"
                            id="btn-add-ball"
                            class="toolbar-spawn-btn toolbar-spawn-btn--ball"
                            aria-label="Добавить мяч"
                        ></button>
                        <button
                            type="button"
                            id="btn-add-player-red"
                            class="toolbar-spawn-btn toolbar-spawn-btn--player toolbar-spawn-btn--player-red"
                            aria-label="Добавить красного игрока"
                        ></button>
                        <button
                            type="button"
                            id="btn-add-player-blue"
                            class="toolbar-spawn-btn toolbar-spawn-btn--player toolbar-spawn-btn--player-blue"
                            aria-label="Добавить синего игрока"
                        ></button>
                    </div>
                    <div class="toolbar-draw-tools">

                            id="btn-finger"
